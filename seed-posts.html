const BUCKET = 'images';

async function uploadToSupabase(unsplashUrl, index) {
    // Fetch image from Unsplash
    const response = await fetch(unsplashUrl);
    const blob = await response.blob();

    const fileName = 'posts/seed_' + Date.now() + '_' + index + '.jpg';

    // Upload to Supabase Storage
    const uploadRes = await fetch(
        SUPABASE_URL + '/storage/v1/object/' + BUCKET + '/' + fileName,
        {
            method: 'POST',
            headers: {
                'Authorization': 'Bearer ' + SUPABASE_KEY,
                'apikey': SUPABASE_KEY,
                'Content-Type': 'image/jpeg',
                'x-upsert': 'true'
            },
            body: blob
        }
    );

    if (!uploadRes.ok) {
        const err = await uploadRes.text();
        throw new Error('Supabase upload failed: ' + err);
    }

    // Return public URL
    return SUPABASE_URL + '/storage/v1/object/public/' + BUCKET + '/' + fileName;
}

async function adminLogin() {
    const email = document.getElementById('adminEmail').value.trim();
    const pass = document.getElementById('adminPass').value;
    const status = document.getElementById('loginStatus');

    if (!email || !pass) { status.textContent = 'Enter email & password'; return; }

    status.textContent = 'Logging in...';
    try {
        await primaryAuth.signInWithEmailAndPassword(email, pass);
        status.textContent = 'Logged in as ' + email;
        status.style.color = 'green';
        document.getElementById('seedBtn').disabled = false;
        document.getElementById('cleanBtn').disabled = false;
        document.getElementById('loginBtn').disabled = true;
        logEl.textContent = 'Logged in! Ready to seed.\n';
    } catch (err) {
        status.textContent = 'Login failed: ' + err.message;
        status.style.color = 'red';
    }
}

const TEST_ARTISTS = [

    { name: 'Fatima Al-Zahra',     email: 'fatima.zahra@artisans.com',     category: 'Sculpture' },

async function seedAll() {
    const btn = document.getElementById('seedBtn');
    btn.disabled = true;
    logEl.textContent = '';
    print('=== Starting seed process ===\n');

    const artistIds = {};

    for (const artist of TEST_ARTISTS) {
        print('--- Artist: ' + artist.name + ' (' + artist.email + ')');

        const existing = await db.collection('users').where('email', '==', artist.email).limit(1).get();

        if (!existing.empty) {
            const doc = existing.docs[0];
            artistIds[artist.name] = doc.id;
            print('  Already exists (uid: ' + doc.id + ') - skipping creation');
            continue;
        }

        try {
            const cred = await secondaryAuth.createUserWithEmailAndPassword(artist.email, PASSWORD);
            const uid = cred.user.uid;
            await secondaryAuth.signOut();

            await db.collection('users').doc(uid).set({
                name: artist.name,
                email: artist.email,
                role: 'artist',
                status: 'active',
                category: artist.category,
                averageRating: 0.0,
                profileImageUrl: '',
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            await db.collection('subscriptions').doc(uid).set({
                orderId: '',
                plan: 'free',
                status: 'active',
                postLimit: 5,
                amount: 0,
                startDate: firebase.firestore.FieldValue.serverTimestamp(),
                endDate: null,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            artistIds[artist.name] = uid;
            print('  Created! uid: ' + uid);
        } catch (err) {
            if (err.code === 'auth/email-already-in-use') {
                print('  Auth exists but no Firestore doc - skipping');
            } else {
                print('  ERROR: ' + err.message);
            }
        }
    }

    print('\n=== Creating posts (uploading images to Supabase) ===\n');

    let total = 0;
    for (const [artistName, posts] of Object.entries(TEST_POSTS)) {
        const uid = artistIds[artistName];
        if (!uid) {
            print('Skipping posts for ' + artistName + ' (no uid)');
            continue;
        }

        for (const p of posts) {
            total++;
            print(total + '/15  Uploading image for [' + p.cat + ']...');

            let imageUrl = '';
            try {
                imageUrl = await uploadToSupabase(p.img, total);
                print('        Uploaded to Supabase');
            } catch (err) {
                print('        Image upload failed: ' + err.message + ' — using Unsplash URL');
                imageUrl = p.img;
            }

            await db.collection('posts').add({
                artistId: uid,
                artistName: artistName,
                description: p.desc,
                category: p.cat,
                price: p.price,
                status: 'active',
                imageUrl: imageUrl,
                seeded: true,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            print('        Post saved!');
        }
    }

    print('\n=== DONE! ===');
    print(Object.keys(artistIds).length + ' artists ready, ' + total + ' posts created.');
    print('\nLogin to mobile app with any test artist:');
    print('  mohammed.rashid@artisans.com');
    print('  fatima.zahra@artisans.com');
    print('  hassan.jubouri@artisans.com');
    print('  sara.khaldi@artisans.com');
    print('  ali.moussawi@artisans.com');
    print('Password: ' + PASSWORD);

    btn.disabled = false;
    btn.textContent = 'Create Artists + Posts';
}

async function cleanSeedPosts() {
    if (!confirm('Delete all seeded test posts? (only posts with seeded=true)')) return;

    const btn = document.getElementById('cleanBtn');
    btn.disabled = true;
    logEl.textContent = '';
    print('Deleting seeded posts...\n');

    const snap = await db.collection('posts').where('seeded', '==', true).get();
    let count = 0;
    for (const doc of snap.docs) {
        await doc.ref.delete();
        count++;
        print('Deleted ' + count + '/' + snap.size);
    }

    print('\nDone! Removed ' + count + ' seeded posts.');
    btn.disabled = false;
}
